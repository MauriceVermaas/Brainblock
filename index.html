<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4a7c3a">
<title>Archito</title>
<meta name="description" content="Nederlandstalige leerapp voor beelddenkers: rekenen, spelling, lezen, talen en kritisch denken met een bouw-beloningslus.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<!-- iOS: thuisscherm-app zonder Safari-balk -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Archito">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Lexend:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ==== Thema-variabelen: nieuwe skin = alleen data + deze blokken ==== */
:root{
  --leesfont:'Andika','Lexend',system-ui,sans-serif;
  --pixelfont:'Press Start 2P',var(--leesfont);
  --bg1:#7ec850; --bg2:#4a7c3a; --paneel:#ffffff; --paneeltekst:#20331a;
  --accent:#5a9b3a; --accent2:#3d6b28; --knop:#8ac66a; --knoptekst:#173312;
  --hud:#2f4a22; --valutakleur:#37c0ff; --xp:#ffd23f; --schaduw:rgba(0,0,0,.18);
  --goed:#3ab54a; --bijna:#f5a623; --fout:#e07b53; --letterspatie:.04em;
}
body[data-theme="galaxy"]{
  --bg1:#2b2160; --bg2:#140d33; --paneel:#211a4a; --paneeltekst:#e8e3ff;
  --accent:#7b5bff; --accent2:#4a2fb0; --knop:#5b3fd6; --knoptekst:#ffffff;
  --hud:#0e0824; --valutakleur:#ffd23f; --xp:#ff7bd5;
}
body[data-theme="powerup"]{
  --bg1:#ff7a4d; --bg2:#d43f2a; --paneel:#fff6e8; --paneeltekst:#5a2410;
  --accent:#ff4d6d; --accent2:#c81d3f; --knop:#ffd23f; --knoptekst:#5a2410;
  --hud:#8a2116; --valutakleur:#ffcf3f; --xp:#4dc3ff;
}
body[data-theme="unicorn"]{
  --bg1:#ffc2e6; --bg2:#c86bd6; --paneel:#fff0fb; --paneeltekst:#5a1c4e;
  --accent:#ff6fc4; --accent2:#c84fb0; --knop:#c58bff; --knoptekst:#3a1338;
  --hud:#7a2e78; --valutakleur:#ff5fb0; --xp:#8ad3ff;
}
body[data-theme="voetbal"]{
  --bg1:#5bbf46; --bg2:#2f7d2a; --paneel:#ffffff; --paneeltekst:#173a12;
  --accent:#2e9e3a; --accent2:#1c6b26; --knop:#ffffff; --knoptekst:#173a12;
  --hud:#123c0e; --valutakleur:#111; --xp:#ffd23f;
}
body[data-theme="zeemeermin"]{
  --bg1:#7fe0e0; --bg2:#3aa6c8; --paneel:#eefcff; --paneeltekst:#0d3b4a;
  --accent:#ff86c6; --accent2:#2aa0b8; --knop:#8fe3d8; --knoptekst:#0d3b4a;
  --hud:#0d5568; --valutakleur:#ff6fb5; --xp:#ffd86b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:var(--leesfont); letter-spacing:var(--letterspatie);
  background:linear-gradient(160deg,var(--bg1),var(--bg2)); color:var(--paneeltekst);
  min-height:100%; padding-bottom:40px;
}
h1,h2,h3{font-family:var(--pixelfont); line-height:1.5}
.pix{font-family:var(--pixelfont)}
button,.knop{
  font-family:var(--leesfont); font-size:1.05rem; font-weight:700;
  min-height:58px; min-width:58px; padding:.6em 1em; margin:.25em;
  border:none; border-radius:16px; background:var(--knop); color:var(--knoptekst);
  box-shadow:0 4px 0 var(--schaduw); cursor:pointer; touch-action:manipulation;
  letter-spacing:var(--letterspatie); transition:transform .06s;
}
button:active,.knop:active{transform:translateY(2px); box-shadow:0 2px 0 var(--schaduw)}
button:disabled{opacity:.5}
.groot{font-size:1.4rem; padding:.8em 1.4em}
/* ==== HUD ==== */
#hud{
  position:sticky; top:0; z-index:50; display:flex; flex-wrap:wrap; gap:.4em;
  align-items:center; padding:.5em .7em; background:var(--hud); color:#fff;
}
#hud .naam{font-weight:700}
#hud .xpbalk{flex:1; min-width:90px; height:16px; background:#0004; border-radius:10px; overflow:hidden}
#hud .xpbalk > i{display:block; height:100%; width:0; background:var(--xp); transition:width .4s}
#hud .chip{background:#0003; padding:.35em .6em; border-radius:12px; font-weight:700; white-space:nowrap}
#hud .valuta{color:#fff}
#hud button{min-height:44px; min-width:44px; padding:.3em .5em; margin:0; font-size:1.2rem; background:#ffffff22; color:#fff; box-shadow:none}
/* ==== Schermen ==== */
main{max-width:760px; margin:0 auto; padding:1em}
.scherm{display:none}
.scherm.actief{display:block}
.sectie{background:var(--paneel); color:var(--paneeltekst); border-radius:22px; padding:1em; margin:1em 0; box-shadow:0 6px 20px var(--schaduw)}
.sectie h2{margin:.2em 0 .6em}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.7em}
.spelknop{display:flex; flex-direction:column; align-items:center; gap:.3em; padding:1em .5em; background:var(--accent); color:#fff; border-radius:18px; box-shadow:0 4px 0 var(--accent2); cursor:pointer; touch-action:manipulation; text-align:center}
.spelknop:active{transform:translateY(2px); box-shadow:0 2px 0 var(--accent2)}
.spelknop .ico{font-size:2.2rem}
/* ==== Overlays ==== */
.overlay{position:fixed; inset:0; z-index:100; background:#0008; display:none; align-items:center; justify-content:center; padding:1em}
.overlay.actief{display:flex}
.popup{position:relative; background:var(--paneel); color:var(--paneeltekst); border-radius:22px; padding:1.4em; max-width:560px; width:100%; max-height:90vh; overflow:auto; box-shadow:0 12px 40px #000a}
.sluit{position:sticky; top:0; float:right; margin:-.6em -.6em 0 0; width:48px; height:48px; border-radius:50%; background:var(--fout); color:#fff; font-size:1.4rem; line-height:1; border:none; cursor:pointer; z-index:2}
/* ==== Foutbalk & versie ==== */
#foutbalk{position:fixed; left:0; right:0; bottom:0; z-index:9999; background:#c0392b; color:#fff; font-family:monospace; font-size:.8rem; padding:.5em .8em; display:none}
#versie{position:fixed; right:6px; bottom:2px; z-index:60; font-size:.65rem; color:#fff8; font-family:monospace}
/* ==== Feedback ==== */
.feedback{font-weight:700; min-height:1.5em; margin:.5em 0}
.feedback.goed{color:var(--goed)} .feedback.bijna{color:var(--bijna)}
@keyframes schud{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
.schud{animation:schud .3s}
@keyframes breek{to{transform:scale(.2) rotate(15deg); opacity:0}}
.breek{animation:breek .35s forwards}
.blij{font-size:1.1rem}
/* ==== Rekenblok / knoppen antwoorden ==== */
.steenblok{font-family:var(--pixelfont); font-size:1.8rem; background:#b98a5a; color:#fff2d8; border:6px solid #7c5a34; border-radius:14px; padding:.7em 1em; text-align:center; margin:.4em auto; max-width:340px; text-shadow:2px 2px 0 #0006}
.antwoorden{display:grid; grid-template-columns:1fr 1fr; gap:.6em; max-width:360px; margin:.6em auto}
.antwoorden button{font-size:1.5rem}
/* Diverse hulp */
.rij{display:flex; flex-wrap:wrap; gap:.4em; align-items:center}
.midden{text-align:center}
.klein{font-size:.85rem; opacity:.85}
.reset{display:block; text-align:center; margin:1.5em auto .5em; color:#fff8; font-size:.8rem}

/* ===================== Zachte, ronde, speelse laag (Toca-geïnspireerd) ===================== */
:root{ --letterspatie:.03em; --rond:26px; }
body{ background-attachment:fixed; }
/* pastel-was over de themakleuren zodat alles zachter oogt */
body::before{ content:""; position:fixed; inset:0; background:radial-gradient(120% 90% at 50% 0%, #ffffff44, #ffffff00 60%); pointer-events:none; z-index:0; }
main, #hud{ position:relative; z-index:1; }   /* .overlay NIET hier: die moet position:fixed blijven (gecentreerde pop-up) */
h1,h2,h3{ text-shadow:0 2px 0 rgba(0,0,0,.06); }
button,.knop{
  border-radius:22px; font-weight:700;
  box-shadow:0 5px 0 var(--schaduw), 0 9px 16px rgba(0,0,0,.10);
}
button:active,.knop:active{ box-shadow:0 2px 0 var(--schaduw), 0 4px 8px rgba(0,0,0,.10); }
.groot{ border-radius:28px; }
.sectie{ border-radius:32px; border:4px solid #ffffffcc; box-shadow:0 12px 30px var(--schaduw); }
.spelknop{ border-radius:28px; box-shadow:0 6px 0 var(--accent2), 0 12px 20px rgba(0,0,0,.12); transition:transform .08s; }
.spelknop:hover{ transform:translateY(-2px); }
.spelknop .ico{ font-size:2.4rem; filter:drop-shadow(0 3px 2px rgba(0,0,0,.18)); }
.popup{ border-radius:34px; border:6px solid #fff; box-shadow:0 18px 50px #0009; }
.sluit{ box-shadow:0 4px 10px rgba(0,0,0,.25); }
.steenblok{ border-radius:22px; }
#hud{ border-radius:0 0 26px 26px; box-shadow:0 6px 16px rgba(0,0,0,.18); }
#hud .chip{ border-radius:16px; }
#hud .xpbalk{ border-radius:12px; }
.antwoorden button{ border-radius:24px; }
/* ==== Beelddenken (visuele denkpuzzels) ==== */
.beeldprompt{ display:flex; flex-wrap:wrap; gap:.35em; justify-content:center; align-items:center; background:#00000008; border:3px dashed var(--accent); border-radius:18px; padding:.7em; margin:.6em auto; max-width:460px; }
.beeldprompt span{ font-size:2.9rem; line-height:1; }
#memGrid .ico{ font-size:3rem; }
.beeldprompt .gat{ opacity:1; filter:none; background:var(--accent); color:#fff; border-radius:12px; padding:0 .15em; }
.beeldopties{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:.8em; max-width:560px; margin:.6em auto; }
.beeldtegel{ font-size:3.8rem; line-height:1; background:var(--paneel); border:4px solid #0002; border-radius:22px; padding:.55em .4em; cursor:pointer; box-shadow:0 5px 0 var(--schaduw); transition:transform .08s; min-height:104px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.2em; }
.beeldtegel img{ width:80px; height:80px; object-fit:contain; }
.beeldtegel:hover{ border-color:var(--accent); }
.beeldtegel:active{ transform:translateY(3px); box-shadow:0 2px 0 var(--schaduw); }
.beeldtegel.fout{ animation:schud .3s; border-color:var(--fout); }
.beeldtegel.raak{ border-color:var(--goed); transform:scale(1.06); }
.beeldopdracht{ font-family:var(--pixelfont); font-size:1rem; line-height:1.6; text-align:center; margin:.4em 0; }
/* ==== Beeldlab (doe-puzzels) ==== */
.beeldtegel.klein{ font-size:2.6rem; min-height:72px; padding:.3em 0; }
.beeldtegel .bllabel{ font-family:var(--leesfont); font-size:.8rem; margin-top:.2em; }
.blrij{ display:flex; flex-wrap:wrap; gap:.5em; justify-content:center; align-items:center; margin:.6em auto; max-width:460px; min-height:60px; }
.blslot{ font-size:2rem; opacity:.35; width:56px; text-align:center; }
.blgrid{ display:grid; gap:4px; justify-content:center; margin:.5em auto; }
.blcel{ width:44px; height:44px; border:2px solid #0002; border-radius:8px; padding:0; cursor:pointer; }
.blpal{ display:flex; gap:.4em; justify-content:center; margin:.4em 0; }
.blchip{ width:40px; height:40px; border:3px solid #0003; border-radius:50%; cursor:pointer; padding:0; }
.blchip.gum{ background:#fff; color:#c0392b; }
.blchip.aan{ border-color:var(--accent2); transform:scale(1.12); }
.bloptrij{ display:flex; gap:.5em; justify-content:center; background:var(--paneel); border:3px solid #0002; border-radius:16px; padding:.5em; margin:.5em auto; max-width:460px; cursor:pointer; font-size:2rem; }
.bloptrij:hover{ border-color:var(--accent); }
.blveld{ display:grid; gap:.4em; max-width:460px; margin:.6em auto; }
.blveld .beeldtegel{ font-size:1.8rem; min-height:52px; }
.blteller{ font-family:var(--leesfont); font-size:1rem; background:var(--accent); color:#fff; border-radius:12px; padding:.1em .5em; }
/* ==== Kind-profielen (Squla-achtig kiezen) ==== */
.kindgrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:.7em; margin:.6em 0; }
.kindkaart{ background:var(--paneel); border:3px solid #0002; border-radius:18px; padding:.8em .5em; text-align:center; box-shadow:0 5px 0 var(--schaduw); }
.kindkaart.actief{ border-color:var(--accent); }
.kindkaart.nieuw{ display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; border-style:dashed; color:var(--accent2); }
.kindav{ font-size:3rem; line-height:1; cursor:pointer; }
.kindav img{ width:64px; height:64px; object-fit:contain; border-radius:12px; }
.kindnaam{ font-weight:700; margin:.2em 0; cursor:pointer; }
.mini{ min-height:36px; min-width:36px; padding:.2em .4em; font-size:1rem; margin:.1em; }
/* ==== Ouder-voortgang ==== */
.statkaart{ background:var(--paneel); border-radius:14px; padding:.6em; text-align:center; box-shadow:0 3px 0 var(--schaduw); }
.statnum{ font-family:var(--pixelfont); font-size:1.3rem; color:var(--accent2); }
.oudertabel{ width:100%; border-collapse:collapse; font-size:.95rem; margin:.4em 0; }
.oudertabel td{ padding:.25em .4em; border-bottom:1px solid #0001; }
/* ==== Installatie-tip + premium ==== */
.installtip{ background:var(--paneel); color:var(--paneeltekst); border:2px dashed var(--accent); border-radius:16px; padding:.7em 1em; margin:.6em auto; max-width:520px; font-size:.9rem; display:flex; gap:.6em; align-items:center; justify-content:space-between; }
.installtip button{ min-height:40px; padding:.3em .7em; font-size:.9rem; }
.premiumbadge{ font-size:.7rem; }
.premiumkaart{ background:linear-gradient(160deg,#fff3c4,#ffd86b); color:#5a4200; border-radius:18px; padding:1em; margin:.6em 0; box-shadow:0 6px 20px var(--schaduw); }
.premiumkaart h2{ margin:.1em 0 .4em; }
.premiumkaart ul{ margin:.4em 0 .8em; padding-left:1.2em; }
.premiumkaart li{ margin:.2em 0; }
.testbanner{ background:#2e7d32; color:#fff; text-align:center; font-size:.78rem; padding:.25em; }
/* ==== Mascotte op het startscherm ==== */
.mascotte{ display:flex; align-items:center; justify-content:center; gap:.6em; margin:.4em auto 1em; max-width:520px; cursor:pointer; user-select:none; }
.mascotte .fig{ font-size:3.6rem; line-height:1; filter:drop-shadow(0 4px 6px var(--schaduw)); animation:mascotBob 3s ease-in-out infinite; }
.mascotte img.fig{ width:76px; height:76px; object-fit:contain; }
.mascotte .bubbel{ position:relative; background:var(--paneel); color:var(--paneeltekst); border-radius:18px; padding:.7em 1em; box-shadow:0 6px 20px var(--schaduw); max-width:340px; font-weight:700; }
.mascotte .bubbel b{ color:var(--accent2); }
.mascotte .bubbel::before{ content:""; position:absolute; left:-12px; top:50%; transform:translateY(-50%); border:8px solid transparent; border-right-color:var(--paneel); }
.mascotte:active .fig{ transform:scale(1.1) rotate(-6deg); }
@keyframes mascotBob{ 0%,100%{ transform:translateY(0) rotate(-2deg); } 50%{ transform:translateY(-8px) rotate(2deg); } }
@media (prefers-reduced-motion:reduce){ .mascotte .fig{ animation:none; } }
/* zachte pop-in bij nieuwe schermen */
@keyframes popin{ 0%{transform:scale(.96); opacity:0} 100%{transform:scale(1); opacity:1} }
.scherm.actief{ animation:popin .18s ease-out; }

/* ===================== JUICE-laag: combo, deeltjes, screen-pop ===================== */
#juiceLaag{ position:fixed; inset:0; z-index:9998; pointer-events:none; overflow:hidden; }
.deeltje{ position:fixed; z-index:9998; border-radius:2px; pointer-events:none;
  box-shadow:0 0 0 1px rgba(0,0,0,.15); image-rendering:pixelated;
  animation:juiceFly .85s cubic-bezier(.2,.7,.3,1) forwards; }
@keyframes juiceFly{
  0%{ transform:translate(0,0) scale(1) rotate(0); opacity:1; }
  70%{ opacity:1; }
  100%{ transform:translate(var(--dx,0px), calc(var(--dy,0px) + 130px)) scale(.35) rotate(120deg); opacity:0; }
}
.combopop{ position:fixed; left:50%; top:38%; transform:translate(-50%,-50%);
  z-index:9999; pointer-events:none; text-align:center;
  background:linear-gradient(160deg,#ffd23f,#ff7a4d); color:#3a1a00;
  border:5px solid #fff; border-radius:22px; padding:.7em 1.2em;
  box-shadow:0 12px 40px rgba(0,0,0,.35); animation:comboPop 1.5s ease-out forwards; }
.combopop b{ display:block; font-family:var(--pixelfont); font-size:1.05rem; line-height:1.4; }
.combopop span{ font-weight:700; font-size:1rem; }
@keyframes comboPop{
  0%{ transform:translate(-50%,-50%) scale(.3); opacity:0; }
  14%{ transform:translate(-50%,-50%) scale(1.18); opacity:1; }
  30%{ transform:translate(-50%,-50%) scale(1); }
  78%{ transform:translate(-50%,-58%) scale(1); opacity:1; }
  100%{ transform:translate(-50%,-92%) scale(.9); opacity:0; }
}
@keyframes juicePop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.012); } 100%{ transform:scale(1); } }
.juice-pop{ animation:juicePop .22s ease-out; }
#hud .chip.combo{ background:linear-gradient(160deg,#ff9a3d,#ff5a3d); color:#fff; }
@keyframes comboPuls{ 0%{ transform:scale(1); } 50%{ transform:scale(1.18); } 100%{ transform:scale(1); } }
#hud .chip.combo.puls{ animation:comboPuls .28s ease-out; }
@keyframes mascotJuich{ 0%{ transform:translateY(0) rotate(0); } 25%{ transform:translateY(-16px) rotate(-10deg) scale(1.12); } 55%{ transform:translateY(0) rotate(8deg); } 100%{ transform:translateY(0) rotate(0); } }
.mascotte.juich .fig{ animation:mascotJuich .6s ease-out; }
@media (prefers-reduced-motion:reduce){ .deeltje,.combopop,.juice-pop,#hud .chip.combo.puls{ animation:none; } }

/* ===================== Moderne pixel/flat game-laag (v3.11) ===================== */
/* subtiele voxel-gridtextuur op de achtergrond — geeft 'game', blijft rustig */
body::after{
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.55;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(rgba(0,0,0,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.045) 1px, transparent 1px);
  background-size:48px 48px, 48px 48px, 12px 12px, 12px 12px;
}
/* knoppen & speltegels als kleine bouwblokken: top-highlight + harde onderrand */
button, .knop, .spelknop{ position:relative; overflow:hidden; }
button::before, .knop::before, .spelknop::before{
  content:""; position:absolute; left:0; right:0; top:0; height:42%;
  background:linear-gradient(rgba(255,255,255,.26), rgba(255,255,255,0)); pointer-events:none;
}
.spelknop > *{ position:relative; z-index:1; }
/* het rekenblok als een gehouwen steen (pixel-bevel) */
.steenblok{
  background:
    linear-gradient(rgba(255,255,255,.16), rgba(0,0,0,.16)),
    repeating-linear-gradient(0deg, #b98a5a 0 10px, #b0824f 10px 20px);
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.22), inset -3px -4px 0 rgba(0,0,0,.28), 0 8px 0 rgba(0,0,0,.18);
}
.feedback.goed{ text-shadow:0 0 10px rgba(58,181,74,.35); }
/* levende laag in de bouwmodus: figuurtjes glijden soepel en wippen zachtjes */
#bwLeven{ position:absolute; inset:0; pointer-events:none; }
.bwwezen, .bwpop, .bwspark{ position:absolute; line-height:1; pointer-events:none; will-change:left,top;
  transition:left .6s ease, top .6s ease; }
.bwwezen{ font-size:19px; filter:drop-shadow(0 3px 2px rgba(0,0,0,.25)); animation:bwbob 1.3s ease-in-out infinite; }
.bwwezen .wimg{ width:22px; height:22px; object-fit:contain; display:block; }
.bwspark{ font-size:16px; transition:none; }
.isoblok.iso-water{ animation:waterGlinster 2.4s ease-in-out infinite; }
@keyframes waterGlinster{ 0%,100%{ filter:brightness(1); } 50%{ filter:brightness(1.22) saturate(1.25); } }
@media (prefers-reduced-motion:reduce){ .isoblok.iso-water{ animation:none; } }
@keyframes bwbob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-3px); } }
/* het bestuurbare poppetje: eigen naam erboven + eigen wip, zodat het opvalt tussen de rest */
.bwpop{ font-size:23px; text-align:center; z-index:1000; }
.bwpop .jijfig{ display:block; filter:drop-shadow(0 3px 3px rgba(0,0,0,.35)); animation:popbob .9s ease-in-out infinite; }
.bwpop .jijtag{ display:inline-block; font-family:var(--leesfont); font-size:.58rem; font-weight:700; letter-spacing:0;

/* ---- Standaard-state ---- */

    tel:{verdiend:0, geoogst:0, gebouwd:0, dagquest:0, levelups:0, minigame:0}, missieIndex:0, stickers:[], oogstDag:null, hakDag:null,
    speeltijdMin:20, tijdGebruiktSec:0, tijdDatum:"",
    dagquest:{datum:"", reken:0, woord:0, flits:0, klaar:false},
    levels:{},            // levels["reken_1"] = {level, teller}
    somStats:{},          // somStats["3+4"] = {goed,fout,tijd}
    werelden:null, actieveWereld:0, gekochteWerelden:null,
    challengeKlaar:"", schermtijdOverT:false,
    premium:false, premiumInteresse:false, installTipWeg:false
  };
}
var S = nieuweState();
var THEMA = THEMAS.craft;

/* ---- Opslag: alles in één localStorage-key ---- */
var OPSLAG_KEY = "blokwereld_v3";
/* Meerdere kinderen in één app: PROFIELDATA houdt de lijst + het actieve kind bij.
   S blijft het actieve profiel (zelfde vorm als altijd), zodat alle spellen ongewijzigd werken. */
var PROFIELDATA = { profielen:[], actief:0 };
function migreerProfiel(p){
  // oude enkelvoudige wereld → werelden-lijst
  if(p.wereld && (!p.werelden || !p.werelden.length)){
    p.werelden=[{type:"start", grid:p.wereld, w:14, h:14, pop:p.poppositie||{x:6,y:6}, verstopt:null}];
    p.actieveWereld=0; p.gekochteWerelden=["start"]; delete p.wereld; delete p.poppositie;
  }
  return p;
}
function laadState(){
  try{
    var ruw = localStorage.getItem(OPSLAG_KEY);
    if(ruw){
      var g = JSON.parse(ruw);
      if(g && Array.isArray(g.profielen) && g.profielen.length){ PROFIELDATA = g; }
      else { PROFIELDATA = { profielen:[ Object.assign(nieuweState(), g||{}) ], actief:0 }; } // oud enkel profiel → wrapper
    } else { PROFIELDATA = { profielen:[ nieuweState() ], actief:0 }; }
  }catch(e){ PROFIELDATA = { profielen:[ nieuweState() ], actief:0 }; }
  if(!PROFIELDATA.profielen.length) PROFIELDATA.profielen=[nieuweState()];
  if(PROFIELDATA.actief<0 || PROFIELDATA.actief>=PROFIELDATA.profielen.length) PROFIELDATA.actief=0;
  S = migreerProfiel(Object.assign(nieuweState(), PROFIELDATA.profielen[PROFIELDATA.actief]));
  PROFIELDATA.profielen[PROFIELDATA.actief] = S;
  THEMA = THEMAS[S.thema] || THEMAS.craft;
  return S;
}
function bewaarState(){
  try{
    PROFIELDATA.profielen[PROFIELDATA.actief] = S;
    localStorage.setItem(OPSLAG_KEY, JSON.stringify(PROFIELDATA));
  }catch(e){ toonFout("Opslaan mislukt: "+e.message); }
}
/* ---- Meerdere kinderen ---- */
function aantalProfielen(){ return PROFIELDATA.profielen.length; }
function nieuwKind(){
  PROFIELDATA.profielen[PROFIELDATA.actief] = S;              // huidige vastleggen
  PROFIELDATA.profielen.push(nieuweState());
  PROFIELDATA.actief = PROFIELDATA.profielen.length-1;
  S = PROFIELDATA.profielen[PROFIELDATA.actief];
  THEMA = THEMAS.craft; bewaarState();
  openProfiel(true);
}
function kiesKind(idx){
  if(idx<0||idx>=PROFIELDATA.profielen.length) return;
  PROFIELDATA.profielen[PROFIELDATA.actief] = S;              // huidige vastleggen
  PROFIELDATA.actief = idx;
  S = migreerProfiel(Object.assign(nieuweState(), PROFIELDATA.profielen[idx]));
  PROFIELDATA.profielen[idx] = S;
  bewaarState(); pasThemaToe(); updateHud(); startSchermtijdKlok && startSchermtijdKlok();
  sluitOverlay(); naarStart();
}
function verwijderKind(idx){
  if(PROFIELDATA.profielen.length<=1){ toonToast("Er moet minstens één kind blijven."); return; }
  if(typeof confirm==="function" && !confirm("Dit kind en zijn voortgang verwijderen?")) return;
  PROFIELDATA.profielen.splice(idx,1);
  if(PROFIELDATA.actief>=PROFIELDATA.profielen.length) PROFIELDATA.actief=PROFIELDATA.profielen.length-1;
  S = migreerProfiel(Object.assign(nieuweState(), PROFIELDATA.profielen[PROFIELDATA.actief]));
  PROFIELDATA.profielen[PROFIELDATA.actief]=S;
  bewaarState(); pasThemaToe(); updateHud(); kiesProfielScherm();
}
function kindAvatar(p){ if(p&&p.avatar) return p.avatar; var m=(typeof MASCOTTES!=="undefined"&&MASCOTTES[p.thema])||null; if(!m) return "🙂"; if(!m.afbeelding) return m.emoji; var pad=m.afbeelding, i=pad.lastIndexOf('.'), t=(p&&(p.niveau||(typeof groepNaarNiveau==="function"&&groepNaarNiveau(p.groep||3))))||2, src=(i<0?pad:pad.slice(0,i)+'-t'+t+pad.slice(i)); return '<img src="'+src+'" data-base="'+pad+'" alt="" onerror="beeldVal(this)">'; }
function kiesProfielScherm(){
  var kaarten = PROFIELDATA.profielen.map(function(p,i){
    var actief = i===PROFIELDATA.actief;
    return '<div class="kindkaart'+(actief?' actief':'')+'">'

      + (PROFIELDATA.profielen.length>1?'<button class="mini" title="Verwijderen" onclick="verwijderKind('+i+')">🗑️</button>':'')

/* ---- Hamburgermenu: alle instellingen/acties gebundeld achter één ☰ ---- */
function kanInstalleren(){ try{ return !!_installPrompt || isIOS(); }catch(e){ return false; } }

  var geluid = S.geluidAan ? ic('mi-geluid-aan.png')+"Geluid aan" : ic('mi-geluid-uit.png')+"Geluid uit";
  var muziek = S.muziekAan ? ic('mi-muziek-aan.png')+"Muziek aan" : ic('mi-muziek-uit.png')+"Muziek uit";

function resetAlles(){
  if(typeof confirm==="function" && !confirm("Weet je het zeker? ALLE kinderen en voortgang worden gewist.")) return;
  try{ localStorage.removeItem(OPSLAG_KEY); }catch(e){}
  PROFIELDATA = { profielen:[ nieuweState() ], actief:0 }; S = PROFIELDATA.profielen[0];
  location.reload && location.reload();

/* ---- Foutvangnet ---- */
function toonFout(bericht){
  var b = document.getElementById("foutbalk");
  if(b){ b.style.display="block"; b.textContent = "⚠ v"+APP_VERSIE+" — "+bericht; }
}
if(typeof window!=="undefined"){
  window.addEventListener("error", function(ev){ toonFout((ev.message||"Onbekende fout")); });
}

/* ---- Spraak (Web Speech API) ---- */
var _stemmen = [];
function laadStemmen(){
  try{ _stemmen = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }catch(e){ _stemmen=[]; }
  return _stemmen;
}
function kiesBesteStem(taalPrefix){
  var kand = _stemmen.filter(function(v){ return v.lang && v.lang.toLowerCase().indexOf(taalPrefix)===0; });
  if(S.stem){ var g = kand.find(function(v){return v.name===S.stem;}); if(g) return g; }
  var premium = kand.find(function(v){ return /premium|enhanced|natural/i.test(v.name); });
  return premium || kand[0] || null;
}
function zeg(tekst, taalPrefix, rate){
  if(!S.geluidAan) return;
  try{
    if(!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(tekst);
    u.lang = taalPrefix==="en"?"en-GB":taalPrefix==="es"?"es-ES":"nl-NL";
    u.rate = rate || 0.8; u.pitch = 1.25;
    var v = kiesBesteStem(taalPrefix||"nl"); if(v) u.voice = v;
    window.speechSynthesis.speak(u);
  }catch(e){ /* stil falen: spraak is bijzaak */ }
}
function zegTaal(tekst, taal){ zeg(tekst, taal, 0.8); }

/* ---- Geluidseffecten: Web Audio-synth, geen bestanden ---- */
var _actx = null;
function audioCtx(){
  if(_actx) return _actx;
  try{ _actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ _actx=null; }
  return _actx;
}
function toon(freq, duur, start, vol){
  var ac = audioCtx(); if(!ac || !S.geluidAan) return;
  try{ if(ac.state==="suspended" && ac.resume) ac.resume(); }catch(e){}   // mobiel: audio weer aanzetten
  var o = ac.createOscillator(), g = ac.createGain();
  o.frequency.value = freq; o.type="sine";
  var t0 = ac.currentTime + (start||0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol||0.12, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+(duur||0.15));
  o.connect(g); g.connect(ac.destination); o.start(t0); o.stop(t0+(duur||0.15)+0.02);
}
/* korte, gefilterde ruisburst — geeft blokjes een sappige "thock" (Minecraft-gevoel) */
function ruis(duur, start, vol, freq){

    var g = ac.createGain(), t0 = ac.currentTime+(start||0);
    g.gain.setValueAtTime(vol||0.08, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0+(duur||0.1));

/* ---- Optionele achtergrondmuziek: zachte, rustige pentatonische loop (Web Audio, geen bestanden) ---- */
var _muziek = null;
function zachtePad(freq, duur, start, vol){
  var ac = audioCtx(); if(!ac || !S.muziekAan) return;
  try{
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = "triangle"; o.frequency.value = freq;
    var t0 = ac.currentTime+(start||0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol||0.04, t0+0.4);
    g.gain.linearRampToValueAtTime(0.0001, t0+(duur||1.5));
    o.connect(g); g.connect(ac.destination); o.start(t0); o.stop(t0+(duur||1.5)+0.05);
  }catch(e){}
}
function startMuziek(){
  var ac = audioCtx(); if(!ac) return;

  if(_muziek) return;
  var noten = [261.63,293.66,329.63,392.00,440.00], i = 0;   // C D E G A — kalm, nooit schril
  var speel = function(){
    if(!S.muziekAan) return;

/* ---- Level-helpers ---- */
function levelSleutel(spel, extra){ return spel+"_"+(extra||S.niveau); }
function haalLevel(spel, extra){
  var k=levelSleutel(spel,extra);
  if(!S.levels[k]) S.levels[k]={level:1, teller:0};
  return S.levels[k];
}
function goedAntwoordLevel(spel, extra){
  var lv = haalLevel(spel, extra); lv.teller++;
  var omhoog=false;
  if(lv.teller>=5){ lv.teller=0; lv.level++; omhoog=true;
    var bonus = 2 + (lv.level%10===0?10:0);
    geefValuta(bonus); geefXp(20); speelGeluid("levelup");
    puntenSignaal("🎉 +"+bonus+" "+THEMA.valutaNaam+" — level "+lv.level+"!");
    telOp("levelups");
    if(lv.level%5===0) geefStickerNieuw();
    if(typeof window!=="undefined" && !window.__BLOKWERELD_TEST__ && Math.random()<0.4) miniGameStart();  // soms een mini-game als beloning
  } else { geefXp(4); }
  bewaarState();
  return {omhoog:omhoog, level:lv.level, kroon:lv.level>=100};
}
function levelBadge(spel, extra){
  var lv=haalLevel(spel,extra); var bol="";
  for(var i=0;i<5;i++) bol += (i<lv.teller?"●":"○");
  return "⭐ LEVEL "+lv.level+" "+bol;
}

var _schermtijdInt=null;
function vandaagStr(){ return new Date().toISOString().slice(0,10); }
function startSchermtijdKlok(){
  if(S.tijdDatum!==vandaagStr()){ S.tijdDatum=vandaagStr(); S.tijdGebruiktSec=0; S.schermtijdOverT=false; bewaarState(); }
  if(_schermtijdInt) clearInterval(_schermtijdInt);
  _schermtijdInt = setInterval(schermtijdTik, 1000);
}
function schermtijdTik(){
  if(typeof document!=="undefined" && document.hidden) return;   // alleen tellen als zichtbaar
  if(S.speeltijdMin>=999) return;
  S.tijdGebruiktSec++;
  var overSec = S.speeltijdMin*60 - S.tijdGebruiktSec;
  if(overSec===300){ toonToast("Nog 5 minuten spelen 🙂"); zeg("Nog vijf minuten spelen."); }
  if(overSec<=0 && !S.schermtijdOverT){ S.schermtijdOverT=true; toonSchermtijdEind(); }
  if(S.tijdGebruiktSec%10===0) bewaarState();
  updateHud();
}
function toonToast(tekst){
  var d=document.createElement("div"); d.textContent=tekst;
  d.style.cssText="position:fixed;left:50%;top:14%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:.8em 1.2em;border-radius:14px;z-index:200;box-shadow:0 6px 20px #0006;font-weight:700";
  if(document.body){ document.body.appendChild(d); setTimeout(function(){ d.remove&&d.remove(); },3500); }
}
function toonSchermtijdEind(){
  zeg("Goed gespeeld! Tot morgen.");
  var o=document.getElementById("overlay"); var inh=document.getElementById("overlayInhoud");
  if(inh) inh.innerHTML='<h2>Klaar voor vandaag! 🌙</h2><p>Je hebt lekker geoefend. Morgen mag je weer.</p>'
    + '<p><button onclick="ouderVerleng()">Ouder: +10 minuten</button></p>';
  if(o) o.classList.add("actief");
  var sl=document.querySelector("#overlay .sluit"); if(sl) sl.style.display="none"; // niet te omzeilen zonder PIN
}
function ouderVerleng(){
  if(!vraagOuderPin()) return;
  S.speeltijdMin += 10; S.schermtijdOverT=false; bewaarState();
  var sl=document.querySelector("#overlay .sluit"); if(sl) sl.style.display="block";
  sluitOverlay();
}
function vraagOuderPin(){
  if(!S.ouderPin) return true; // geen PIN ingesteld = vrij
  var inv = typeof prompt==="function" ? prompt("Ouder-PIN:") : null;
  if(inv===S.ouderPin) return true;
  toonToast("PIN klopt niet."); return false;
}

/* ---- Ouder-scherm: voortgang + instellingen (achter PIN) ---- */

function ouderVoortgangHtml(){
  var keys = Object.keys(S.levels||{}).sort();
  if(!keys.length) return '<p class="klein">Nog geen voortgang — laat je kind een spel spelen.</p>';
  var rijen = keys.map(function(k){
    var lv=S.levels[k]; var d=k.split("_"); var naam=OUDER_NAMEN[d[0]]||d[0]; var niv=d[1]||"";
    var bol=""; for(var i=0;i<5;i++) bol += (i<(lv.teller||0)?"●":"○");
    return '<tr><td><b>'+naam+'</b></td><td class="klein">niveau '+niv+'</td><td>level '+lv.level+'</td><td>'+bol+'</td></tr>';
  }).join("");
  return '<table class="oudertabel">'+rijen+'</table>';
}
function openOuders(){
  if(!vraagOuderPin()) return;
  ouderScherm();
}

      + PROFIELDATA.profielen.map(function(p,i){

    + '<h3>'+ (aantalProfielen()>1?'Actief kind':'Kind') +'</h3>'
    + '<div class="sectie" style="margin:.4em 0"><b>'+(S.naam||"—")+'</b> · '+(S.leeftijd||"?")+' jaar · groep '+S.groep+'</div>'
    + '<div class="grid" style="grid-template-columns:repeat(3,1fr);gap:.5em">'
      + '<div class="statkaart"><div class="statnum">'+S.oefendagen+'</div><div class="klein">oefendagen</div></div>'
      + '<div class="statkaart"><div class="statnum">'+S.valuta+'</div><div class="klein">'+(THEMA.valutaNaam||"munten")+'</div></div>'
      + '<div class="statkaart"><div class="statnum">'+S.xp+'</div><div class="klein">XP</div></div>'
    + '</div>'
    + '<div class="sectie" style="background:linear-gradient(160deg,#eaf5e2,#d7ecc8);border:2px solid var(--accent2)"><b>🎲 Zonder scherm oefenen</b><br><span class="klein">Tips &amp; spelletjes om samen te spelen zonder telefoon of tablet.</span><br><button class="knop" style="margin-top:.5em" onclick="openOuderTips()">Bekijk tips &amp; spelletjes →</button></div>'
    + '<h3>Voortgang per onderdeel</h3>' + ouderVoortgangHtml()

    + '<h3>Instellingen</h3>'
    + '<p class="klein">Speeltijd: <b>'+speeltijd+'</b>'+(S.ouderPin?' · PIN ingesteld 🔒':' · geen PIN')+'</p>'

    + '<a class="reset" style="color:#c0392b" href="#" onclick="resetAlles();return false">Alle gegevens wissen (reset)</a>';

  openOverlay(html);
}

/* ---- Dagquest ---- */
function nieuweDagquestIndienNodig(){
  if(S.dagquest.datum!==vandaagStr()){
    S.dagquest={datum:vandaagStr(), reken:0, woord:0, flits:0, klaar:false}; bewaarState();
  }
}
function dagquestVoortgang(type){
  nieuweDagquestIndienNodig();
  if(S.dagquest.klaar) return;
  var doelen={reken:10, woord:4, flits:3};
  if(type in doelen){ S.dagquest[type]=Math.min(doelen[type], S.dagquest[type]+1); }
  var af = S.dagquest.reken>=10 && S.dagquest.woord>=4 && S.dagquest.flits>=3;
  if(af && !S.dagquest.klaar){ S.dagquest.klaar=true; geefValuta(10); S.oefendagen++; telOp("dagquest"); speelGeluid("schat");
    puntenSignaal("🎁 Dagquest af! +10 "+THEMA.valutaNaam); toonToast("Schatkist! +10 "+THEMA.valutaNaam+" 🎁"); zeg("Alles gedaan! Klaar voor vandaag, morgen een nieuwe kist.");
  }
  bewaarState(); tekenDagquest();
}

  var vak=document.getElementById("dagquestVak"); if(!vak) return;

    + missie("reken",10,"⛏️","sommen","reken")

/* =====================  REKENMIJN (adaptief, Bareka-geïnspireerd)  ===================== */
function somAntwoord(s){ return s.op==="+"?s.a+s.b : s.op==="−"?s.a-s.b : s.op==="×"?s.a*s.b : s.op===":"?s.a/s.b : s.op==="½"?s.a/2 : NaN; }
function somKey(s){ return s.a+s.op+(s.op==="½"?"":s.b); }
function somDisplay(s){
  if(s.op==="½") return "de helft van "+s.a;
  if(s.op===":") return s.a+" : "+s.b;
  if(s.op==="×") return s.a+" × "+s.b;
  return s.a+" "+s.op+" "+s.b;
}
function somVoorlees(s){
  if(s.op==="½") return "de helft van "+s.a;
  if(s.op===":") return s.a+" gedeeld door "+s.b;
  if(s.op==="×") return s.a+" keer "+s.b;
  if(s.op==="−") return s.a+" min "+s.b;
  return s.a+" plus "+s.b;
}
function somDrempel(s){
  if(s.op==="×"||s.op==="½") return 4;
  if(s.op===":" ) return s.a<=20?4:8;
  if((s.op==="+"||s.op==="−") && s.a<=20 && s.b<=20 && somAntwoord(s)<=20) return 4;
  return 8;
}
function somStatus(s){
  var st=S.somStats[somKey(s)];
  if(!st || (st.goed+st.fout)===0) return "nieuw";
  if(st.goed>=3){ if(st.tijd && st.tijd<=somDrempel(s)) return "speed"; return "power"; }
  if(st.fout>=st.goed) return "nogOefenen";
  return "bijna";
}
function somGewicht(s){
  var st=S.somStats[somKey(s)]||{goed:0,fout:0,tijd:0};
  var g = 1 + st.fout*3 - st.goed*0.4;
  var status=somStatus(s);
  if(status==="power" && st.tijd>somDrempel(s)) g += 1.4;   // speedtraining
  if(status==="speed") g *= 0.3;                            // onderhoud
  return Math.max(0.15, g);
}
var _rm = {som:null, start:0, vorigeKey:null};
function rmPool(){ return SOMMEN.filter(function(s){ return s.niveau<=S.niveau; }); }
function rmSelecteer(pool){
  var kand = pool.filter(function(s){ return somKey(s)!==_rm.vorigeKey; });
  if(kand.length===0) kand=pool;
  var totaal=0, gew=kand.map(function(s){ var g=somGewicht(s); totaal+=g; return g; });
  var r=Math.random()*totaal, acc=0;
  for(var i=0;i<kand.length;i++){ acc+=gew[i]; if(r<=acc) return kand[i]; }
  return kand[kand.length-1];
}
function rmInstinkers(s){
  var juist=somAntwoord(s), set={}; set[juist]=1; var kand;
  if(s.op==="×") kand=[juist+s.a,juist-s.a,juist+s.b,juist-s.b,juist+1,juist-1];
  else if(s.op===":"||s.op==="½") kand=[juist+1,juist-1,juist+2,juist-2];
  else kand=[juist+1,juist-1,juist+2,juist-2,juist+10,juist-10];
  var alt=[];
  kand.forEach(function(k){ if(k>=0 && !set[k]){ set[k]=1; alt.push(k); } });
  var e=1; while(alt.length<3){ if(!set[juist+e]){ set[juist+e]=1; alt.push(juist+e); } e++; }
  return alt.slice(0,3);
}
function rmOpties(s){
  var opts=[somAntwoord(s)].concat(rmInstinkers(s));
  for(var i=opts.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=opts[i]; opts[i]=opts[j]; opts[j]=t; }
  return opts;
}
function startRekenmijn(){ rmVolgende(); }
function rmVolgende(){ _rm.som=rmSelecteer(rmPool()); _rm.start=Date.now(); rmTeken(); }
function rmTeken(){
  var inh=document.getElementById("spelInhoud"); if(!inh) return; var s=_rm.som;
  inh.innerHTML='<div class="midden">'
    + '<div class="klein" id="rmBadge">'+levelBadge("reken")+'</div>'
    + '<div class="steenblok" id="rmBlok">'+somDisplay(s)+' = ?</div>'
    + '<button onclick="rmLees()">🔊 Lees voor</button>'
    + '<div class="antwoorden" id="rmAntw"></div>'
    + '<div class="feedback" id="rmFb"></div>'
    + '<div id="rmHint"></div>'
    + '<button onclick="rmHintTonen()">💡 Hint</button> '
    + '<button onclick="toonMuur()">🧱 Mijn muur</button></div>';
  var an=document.getElementById("rmAntw");
  rmOpties(s).forEach(function(o){ var b=document.createElement("button"); b.textContent=o;
    b.onclick=(function(v){ return function(){ rmKies(v); }; })(o); an&&an.appendChild(b); });
}
function rmLees(){ zeg(somVoorlees(_rm.som)+" is"); }
function rmKies(val){
  var s=_rm.som, juist=somAntwoord(s), key=somKey(s);
  var st=S.somStats[key]||(S.somStats[key]={goed:0,fout:0,tijd:0});
  var secs=(Date.now()-_rm.start)/1000;
  var fb=document.getElementById("rmFb"), blok=document.getElementById("rmBlok");
  if(val===juist){
    st.goed++; st.tijd = st.tijd ? (0.6*st.tijd + 0.4*secs) : secs;
    _rm.vorigeKey=key; speelGeluid("goed");
    var vlot = secs<=somDrempel(s);
    if(fb){ fb.className="feedback goed"; fb.textContent=feedbackZin("goed")+(vlot?" ⚡":""); }
    if(blok) blok.classList.add("breek");
    goedAntwoordLevel("reken"); dagquestVoortgang("reken"); bewaarState();
    setTimeout(rmVolgende, 650);
  } else {
    st.fout++; speelGeluid("bijna");
    if(fb){ fb.className="feedback bijna"; fb.textContent=feedbackZin("bijna"); }
    if(blok){ blok.classList.add("schud"); setTimeout(function(){ blok.classList.remove("schud"); },350); }
    rmHintTonen(); bewaarState();   // automatische visuele hint bij fout
  }
}
function rmHintTonen(){ var h=document.getElementById("rmHint"); if(h) h.innerHTML=bouwHint(_rm.som); zeg("Kijk maar naar de blokjes."); }
function bouwHint(s){
  if(s.op==="×") return hintTafel(s);
  if(s.op==="½") return hintHelft(s);
  if(s.op===":") return hintDelen(s);
  return (Math.max(s.a,s.b,somAntwoord(s))>20) ? hintHonderdveld(s) : hintBlokjes(s);
}
function _blokjes(n, kleur){ var h=""; for(var i=0;i<n;i++) h+='<span style="display:inline-block;width:16px;height:16px;margin:1px;border-radius:3px;background:'+kleur+';border:1px solid #0004"></span>'; return h; }
function hintBlokjes(s){
  // t/m 20: eenheidsblokjes, gesplitst bij het tiental
  if(s.op==="−"){
    return '<div class="sectie"><b>'+s.a+' eraf '+s.b+':</b><br>'+_blokjes(s.a-s.b,"#7ec850")+_blokjes(s.b,"#e07b53")+'<br><span class="klein">De oranje blokjes gaan weg.</span></div>';
  }
  var eerste=Math.min(10,s.a), rest_a=s.a-eerste;
  return '<div class="sectie"><b>'+s.a+' erbij '+s.b+':</b><br>'
    + _blokjes(s.a,"#7ec850")+' <b>|</b> '+_blokjes(s.b,"#37c0ff")
    + '<br><span class="klein">Maak eerst 10 vol, tel dan verder.</span></div>';
}
function hintHonderdveld(s){
  var start=s.a, doel=somAntwoord(s);
  var h='<div class="sectie"><b>Honderdveld — spring van '+start+' naar '+doel+':</b><div style="display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:300px;margin:.4em auto">';
  var lo=Math.min(start,doel), hi=Math.max(start,doel);
  for(var n=1;n<=100;n++){
    var kl="#eee", tx=n;
    if(n===start) kl="#ffd23f";
    else if(n===doel){ kl="#fff"; tx="?"; }
    else if(n>lo && n<hi) kl="#8ac66a";
    h+='<span style="font-size:.6rem;text-align:center;padding:2px;background:'+kl+';border:1px solid #ccc;border-radius:3px">'+tx+'</span>';
  }
  return h+'</div></div>';
}
function hintTafel(s){
  var groepen=s.b, per=s.a;
  var h='<div class="sectie"><b>'+s.a+' × '+s.b+' = '+groepen+' groepjes van '+per+':</b><br>';
  for(var g=0;g<groepen;g++){ h+='<span style="display:inline-block;padding:2px;margin:2px;border:1px dashed #888;border-radius:6px">'+_blokjes(per,"#5a9b3a")+'</span>'; }
  return h+'</div>';
}
function hintHelft(s){
  var half=s.a/2;
  return '<div class="sectie"><b>De helft van '+s.a+':</b><br>'+_blokjes(half,"#5a9b3a")+'<br>'+_blokjes(half,"#37c0ff")+'<br><span class="klein">Twee gelijke rijen van '+half+'.</span></div>';
}
function hintDelen(s){
  var groepen=s.b, per=s.a/s.b;
  var h='<div class="sectie"><b>'+s.a+' : '+s.b+' = '+s.a+' verdeeld over '+groepen+' groepjes:</b><br>';
  for(var g=0;g<groepen;g++){ h+='<span style="display:inline-block;padding:2px;margin:2px;border:1px dashed #888;border-radius:6px">'+_blokjes(per,"#5a9b3a")+'</span>'; }
  return h+'<br><span class="klein">Elk groepje heeft er '+per+'.</span></div>';
}
/* ---- Mijn muur: trots-overzicht per som ---- */
function statusKleur(status){ return {speed:"#37c0ff",power:"#3ab54a",bijna:"#f5a623",nogOefenen:"#e07b53",nieuw:"#ddd"}[status]; }
function statusLabel(status){ return {speed:"supersnel ⚡",power:"gekend",bijna:"bijna",nogOefenen:"nog oefenen",nieuw:"nieuw"}[status]; }
function toonMuur(){
  var pool=rmPool();
  var legenda=["speed","power","bijna","nogOefenen","nieuw"].map(function(k){ return '<span style="white-space:nowrap"><span style="display:inline-block;width:12px;height:12px;background:'+statusKleur(k)+';border-radius:3px"></span> '+statusLabel(k)+'</span>'; }).join(" &nbsp; ");
  var chips=pool.map(function(s){ var st=somStatus(s);
    return '<span title="'+statusLabel(st)+'" style="display:inline-block;font-size:.7rem;padding:3px 5px;margin:2px;border-radius:6px;background:'+statusKleur(st)+';color:#173312">'+somDisplay(s)+'</span>';
  }).join("");
  openOverlay('<h2>🧱 Mijn muur</h2><p class="klein">'+legenda+'</p><div>'+chips+'</div>');
}

function _shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

var _bm={opgave:null};
function bmKlokTekst(u,m){
  var uur=u, volg=(u%12)+1;

  if(m===30) return "half "+volg;
  if(m===45) return "kwart voor "+volg;
  return uur+" uur "+m;
}
function bmKlokSvg(u,m){
  var cx=60,cy=60,r=52;
  var mh=(m/60)*2*Math.PI - Math.PI/2;
  var hh=((u%12)/12 + m/720)*2*Math.PI - Math.PI/2;
  function pt(ang,len){ return [cx+Math.cos(ang)*len, cy+Math.sin(ang)*len]; }
  var mp=pt(mh,42), hp=pt(hh,28);
  var ticks="";
  for(var i=0;i<12;i++){ var a=i/12*2*Math.PI-Math.PI/2; var p1=pt(a,r), p2=pt(a,r-7); ticks+='<line x1="'+p1[0].toFixed(1)+'" y1="'+p1[1].toFixed(1)+'" x2="'+p2[0].toFixed(1)+'" y2="'+p2[1].toFixed(1)+'" stroke="#333" stroke-width="2"/>'; }
  return '<svg viewBox="0 0 120 120" width="150" height="150" xmlns="http://www.w3.org/2000/svg">'
    +'<circle cx="60" cy="60" r="56" fill="#fff" stroke="#333" stroke-width="3"/>'+ticks
    +'<line x1="60" y1="60" x2="'+hp[0].toFixed(1)+'" y2="'+hp[1].toFixed(1)+'" stroke="#333" stroke-width="5" stroke-linecap="round"/>'
    +'<line x1="60" y1="60" x2="'+mp[0].toFixed(1)+'" y2="'+mp[1].toFixed(1)+'" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>'
    +'<circle cx="60" cy="60" r="4" fill="#333"/></svg>';
}
function bmGenereer(){
  var lijst=[]; var rnd=function(n){ return Math.floor(Math.random()*n); };

  var a=3+rnd(8), b=2+rnd(7);
  lijst.push({vraag:"Je hebt "+a+" blokken en krijgt er "+b+" bij. Hoeveel blokken heb je nu?", goed:a+b, visueel:_blokjes(a,"#7ec850")+_blokjes(b,"#37c0ff")});
  // geld (terugkrijgen)
  var prijs=2+rnd(7), betaald=10;
  lijst.push({vraag:"Een appel kost "+prijs+" munten. Je betaalt met "+betaald+". Hoeveel krijg je terug?", goed:betaald-prijs, visueel:"🪙".repeat(betaald)});
  // verdelen
  var kind=2+rnd(3), elk=2+rnd(4), tot=kind*elk;

  // meerstaps
  var x=4+rnd(5), y=2+rnd(4), z=1+rnd(3);

  lijst.push({vraag:"Hoe laat is het?", goed:goedT, tekstantwoord:true, opties:_shuffle([goedT].concat(foutT.slice(0,3))), svg:bmKlokSvg(uur,mins)});
  return lijst;
}

/* ---- Modus 1: Op volgorde (tik/sleep) ---- */
function blTekenSorteer(){
  var inh=document.getElementById("spelInhoud"); if(!inh)return; var d=_bl.item;
  _bl.pool=_shuffle(d.items.slice()); _bl.antwoord=[];
  inh.innerHTML=blKop()+'<div class="beeldopdracht">'+d.opdracht+'</div><button onclick="zeg(_bl.item.opdracht)">🔊 Lees voor</button>'
   +'<div class="blrij" id="blAntw"></div><p class="klein">Tik in de goede volgorde</p><div class="blrij" id="blPool"></div><div class="feedback" id="blFb"></div>';
  blSorteerTeken(); zeg(d.opdracht);
}
function blSorteerTeken(){
  var pool=document.getElementById("blPool"), ant=document.getElementById("blAntw"); if(!pool||!ant)return;
  pool.innerHTML=""; _bl.pool.forEach(function(x,i){ var b=document.createElement("button"); b.className="beeldtegel klein"; b.textContent=x; b.onclick=function(){ blSorteerPak(i); }; pool.appendChild(b); });
  ant.innerHTML=""; _bl.antwoord.forEach(function(x,i){ var b=document.createElement("button"); b.className="beeldtegel klein raak"; b.textContent=x; b.onclick=function(){ blSorteerTerug(i); }; ant.appendChild(b); });
  for(var k=_bl.antwoord.length;k<_bl.item.items.length;k++){ var leeg=document.createElement("span"); leeg.className="blslot"; leeg.textContent="□"; ant.appendChild(leeg); }
}
function blSorteerPak(i){ _bl.antwoord.push(_bl.pool.splice(i,1)[0]); blSorteerTeken(); if(_bl.antwoord.length===_bl.item.items.length) blSorteerControleer(); }
function blSorteerTerug(i){ _bl.pool.push(_bl.antwoord.splice(i,1)[0]); blSorteerTeken(); }
function blSorteerControleer(){ var ok=_bl.antwoord.join("|")===_bl.item.goed.join("|"); if(ok) blGoed(); else { blMis(); _bl.pool=_shuffle(_bl.antwoord.concat(_bl.pool)); _bl.antwoord=[]; blSorteerTeken(); } return ok; }

      var t=document.getElementById("blTeller"); if(t) t.textContent=_bl.gevonden.length+"/"+_bl._doelTotaal;
      if(_bl.gevonden.length>=_bl._doelTotaal) blGoed(); } return true; }
  else { if(el){ el.classList.add("fout"); setTimeout(function(){ if(el) el.classList.remove("fout"); },350); } speelGeluid("bijna"); return false; }

/* =====================  BEGRIJPEND LEZEN (voorgelezen + begripsvragen)  =====================
   Het verhaal wordt voorgelezen zodat het ontcijferen geen drempel is; de vragen trainen het
   begrip met korte, tikbare antwoorden. Data-gestuurd via data/lezen.js. */
var _lz = { verhaal:null, idx:0 };
function lzPool(){ return (typeof LEZEN!=="undefined"?LEZEN:[]).filter(function(v){ return v.niveau<=S.niveau; }); }
function startLezen(){
  var p=lzPool();
  if(!p.length){ var inh=document.getElementById("spelInhoud"); if(inh) inh.innerHTML='<p class="klein">Nog geen verhalen op dit niveau.</p>'; return; }
  _lz.verhaal = p[Math.floor(Math.random()*p.length)]; _lz.idx=0; lzTeken(); lzLeesVerhaal();
}
function lzTeken(){
  var inh=document.getElementById("spelInhoud"); if(!inh) return; var v=_lz.verhaal; if(!v) return;
  var vr=v.vragen[_lz.idx];
  inh.innerHTML='<div class="midden"><div class="klein">'+levelBadge("lezen")+'</div>'
    +'<div class="sectie leestekst"><h2 class="pix" style="font-size:1.05rem">'+v.titel+'</h2><p>'+v.tekst+'</p>'
    +'<button onclick="lzLeesVerhaal()">🔊 Lees het verhaal voor</button></div>'
    +'<div class="beeldopdracht">Vraag '+(_lz.idx+1)+' van '+v.vragen.length+'</div>'
    +'<div class="sectie"><b>'+vr.vraag+'</b> <button class="mini" onclick="lzLeesVraag()">🔊</button></div>'
    +'<div class="antwoorden lezenantw" id="lzOpties"></div>'
    +'<div class="feedback" id="lzFb"></div><div id="lzUitleg"></div></div>';
  var o=document.getElementById("lzOpties");
  _shuffle(vr.opties).forEach(function(opt){ var b=document.createElement("button"); b.textContent=opt;
    b.onclick=(function(val){ return function(){ lzKies(val); }; })(opt); o&&o.appendChild(b); });
}
function lzLeesVerhaal(){ var v=_lz.verhaal; if(v) zeg(v.titel+". "+v.tekst); }
function lzLeesVraag(){ var v=_lz.verhaal; if(v) zeg(v.vragen[_lz.idx].vraag); }
function lzVolgendeVraag(){ lzTeken(); lzLeesVraag(); }
function lzKies(val){
  var v=_lz.verhaal, vr=v.vragen[_lz.idx];
  var fb=document.getElementById("lzFb"), u=document.getElementById("lzUitleg");
  if(val===vr.goed){
    speelGeluid("goed"); if(fb){ fb.className="feedback goed"; fb.textContent=feedbackZin("goed"); }
    if(u) u.innerHTML='<div class="sectie"><b>Goed! </b>'+vr.uitleg+'</div>';
    geefValuta(1); goedAntwoordLevel("lezen"); zeg(vr.uitleg); bewaarState();
    _lz.idx++;
    if(_lz.idx < v.vragen.length){ setTimeout(lzVolgendeVraag, 1600); }
    else { setTimeout(startLezen, 1900); }   // verhaal uit → volgend verhaal
    return true;
  } else {
    speelGeluid("bijna"); if(fb){ fb.className="feedback bijna"; fb.textContent="Luister nog eens goed naar het verhaal 👂"; }
    lzLeesVerhaal(); return false;
  }
}

/* Akkerbouw: op een akker groeit vanzelf groente/fruit dat je kunt oogsten voor een béétje extra.
   Bewust klein gehouden — de meeste diamanten verdien je met de leerspellen. GEWAS staat los van
   het bouwpalet (geen plaatsbare blokken, alleen groei-beeldjes). */
var GEWAS = { kiem:{emoji:"🌱"}, wortel:{emoji:"🥕"}, aardbei:{emoji:"🍓"}, mais:{emoji:"🌽"}, appel:{emoji:"🍎"}, druiven:{emoji:"🍇"}, tomaat:{emoji:"🍅"} };
var GEWAS_RIJP = ["wortel","aardbei","mais","appel","druiven","tomaat"];
var GEWAS_KANS = 0.06;      // groeikans per beweegtik per akker (langzaam → minimale opbrengst)

var HAK_MAX_PER_DAG = 10;   // grens: zoveel diamanten kun je per dag terugverdienen met weghakken
function blokDef(type){ return BLOKKEN[type] || GEWAS[type] || {kleur:"#ccc"}; }
function bwIsRijp(type){ return !!(GEWAS[type] && type!=="kiem"); }

/* Rondlopend leven per wereldtype: dieren + poppetjes die vanzelf bewegen (actie!).
   Data-gestuurd via data/wezens.js (bewerkbaar in beheer.html). Valt terug op onderstaande

var WEZEN_PRIJS = 3;
var WEZENS_FALLBACK = {
  start:["🐔","🐑","🐷","🐴","🐤","🐕","🧒","🧑‍🌾"],
  strand:["🦀","🦆","🐕","🐤","🧒","🏄"],

};
function _normWezen(x){ return (typeof x==="string") ? {emoji:x, afbeelding:""} : {emoji:x.emoji, afbeelding:x.afbeelding||""}; }
function wezenBron(){ return (typeof WEZENS!=="undefined" && WEZENS) ? WEZENS : WEZENS_FALLBACK; }
function wezenLijst(type){ var b=wezenBron(); return (b[type]||b.start||[]).map(_normWezen); }
function wezenKoopbaar(){ return (wezenBron().koopbaar||[]).map(_normWezen); }

/* ---- Wereld-definities (uitbreidbaar: nieuw type = alleen hier + een generator) ---- */
function bwDef(type){ return ({
  start:{naam:"Blokwereld", ico:"⛏️", prijs:0, gen:genStart},
  strand:{naam:"Strand", ico:"🏖️", prijs:25, gen:genStrand},
  park:{naam:"Park", ico:"🏞️", prijs:25, gen:genPark},
  huis:{naam:"Huis", ico:"🏠", prijs:30, gen:genHuis}
})[type]; }
function bwKoopbareTypes(){ return ["strand","park","huis"]; }
function _leegGrid(w,h,bodem){ var g=[]; for(var y=0;y<h;y++){ var r=[]; for(var x=0;x<w;x++) r.push([bodem||"gras"]); g.push(r); } return g; }
/* De werelden starten zonder spullen (geen bomen/dieren/schatten → bouwen blijft de beloning),
   maar krijgen wél zacht terreinreliëf van alleen grondblokken, zodat het isometrisch/3D oogt. */
function reliefGrid(w,h,bodem){
  bodem = bodem||"gras";
  var g=_leegGrid(w,h,bodem);
  var heuvels = Math.max(3, Math.floor(w*h*0.06));   // een paar zachte heuveltjes
  for(var i=0;i<heuvels;i++){
    var cx=1+Math.floor(Math.random()*(w-2)), cy=1+Math.floor(Math.random()*(h-2)), hoog=1+Math.floor(Math.random()*2);
    for(var d=0;d<hoog;d++){ g[cy][cx].push(bodem); }
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(o){ var x=cx+o[0],y=cy+o[1]; if(g[y]&&g[y][x]&&Math.random()<0.55) g[y][x].push(bodem); });
  }
  return g;
}
function genStart(w,h){ return reliefGrid(w,h,"gras"); }
function genStrand(w,h){ return reliefGrid(w,h,"zand"); }
function genPark(w,h){ return reliefGrid(w,h,"gras"); }
function genHuis(w,h){ return reliefGrid(w,h,"hout"); }

/* ---- Werelden-state (met migratie van oude enkelvoudige wereld) ---- */
function bwInitWerelden(){
  S.werelden=[{type:"start", grid:genStart(14,14), w:14, h:14, pop:{x:6,y:6}, verstopt:null}];
  S.actieveWereld=0; S.gekochteWerelden=["start"];
}
function bwWereld(){
  if(!S.werelden || !S.werelden.length) bwInitWerelden();
  if(S.actieveWereld>=S.werelden.length || S.actieveWereld<0) S.actieveWereld=0;
  var w=S.werelden[S.actieveWereld];
  if(!w.wezens) bwBevolk(w);   // wereld leven inblazen (ook na migratie/aankoop)
  return w;
}
/* De wereld start zonder leven; het kind koopt zelf maatjes (🐾) die dan gaan rondlopen. */
function bwBevolk(w){ w.wezens = []; }
function startBouwmodus(){
  var w=bwWereld(); _bw.actief=true;
  w.verstopt = (Math.random()<0.35) ? {x:Math.floor(Math.random()*w.w), y:Math.floor(Math.random()*w.h)} : null; // 35% per bezoek
  bwTeken();
  bwStartLoop();   // het leven gaat lopen
  if(!_bw.keysGebonden){ _bw.keysGebonden=true; if(typeof window!=="undefined") window.addEventListener("keydown", bwToets); }
}
function bwToets(e){
  if(!_bw.actief) return;
  if(e.key==="ArrowUp"){ bwBeweeg(0,-1); e.preventDefault&&e.preventDefault(); }
  else if(e.key==="ArrowDown"){ bwBeweeg(0,1); e.preventDefault&&e.preventDefault(); }
  else if(e.key==="ArrowLeft"){ bwBeweeg(-1,0); e.preventDefault&&e.preventDefault(); }
  else if(e.key==="ArrowRight"){ bwBeweeg(1,0); e.preventDefault&&e.preventDefault(); }
  else if(e.key===" "||e.key==="Enter"){ bwActie(); e.preventDefault&&e.preventDefault(); }
}
function bwModus(m){ _bw.modus=m; bwTeken(); }
function bwKiesBlok(b){ _bw.blok=b; _bw.modus="bouwen"; bwTeken(); }
function bwBeweeg(dx,dy){
  var w=bwWereld(), p=w.pop;
  var nx=Math.max(0,Math.min(w.w-1,p.x+dx)), ny=Math.max(0,Math.min(w.h-1,p.y+dy));
  p.x=nx; p.y=ny;   // klimt automatisch (geen hoogte-blokkade)
  if(w.verstopt && w.verstopt.x===nx && w.verstopt.y===ny){ w.verstopt=null; geefValuta(2); speelGeluid("schat"); toonToast("Verstopte schat! +2 "+THEMA.valutaNaam+" ✨"); }
  oogst(nx,ny);     // loop je over rijp gewas? dan oogst je het meteen

}

/* isometrische schermpositie van cel (x,y); 'up' tilt een figuurtje op de stapel omhoog */
function bwIso(wl, x, y, up){
  var ox=wl.h*BW_TILEW/2;
  var stap=(wl.grid[y]&&wl.grid[y][x])?wl.grid[y][x].length:1;
  var sx=(x-y)*BW_TILEW/2+ox, sy=(x+y)*BW_TILEH/2 - stap*BW_LAYERH + BW_OY;
  return { x:sx, y:sy-(up||0), z:(x+y)*10+40 };
}
/* Eén blok als echte isometrische KUBUS: bovenkant (diamant) + twee gearceerde zijkanten → 3D. */
function isoBlokHtml(sx, sy, def, z, x, y, type){
  var w=BW_TILEW, ht=BW_TILEH, hv=BW_LAYERH;
  var klik='onclick="bwTikCel('+x+','+y+')" ';
  if(def.afbeelding){
    return '<div '+klik+'style="cursor:pointer;position:absolute;left:'+(sx-14)+'px;top:'+(sy-18)+'px;z-index:'+z+'"><img src="'+def.afbeelding+'" style="width:28px;height:28px;object-fit:contain"></div>';
  }
  if(def.emoji){
    return '<div '+klik+'style="cursor:pointer;position:absolute;left:'+(sx-11)+'px;top:'+(sy-12)+'px;z-index:'+z+';font-size:20px">'+def.emoji+'</div>';
  }
  var kl=(type==="water"?" iso-water":"");
  var glans=def.glans?"box-shadow:0 0 8px 2px #ffe98a;":"";
  var kleur=def.kleur;
  // linker zijkant (donkerst) en rechter zijkant (half donker) — geven de kubus diepte
  var lf='<div '+klik+'class="isoface" style="cursor:pointer;position:absolute;left:'+(sx-w/2)+'px;top:'+(sy+ht/2)+'px;width:'+(w/2)+'px;height:'+(ht/2+hv)+'px;background:'+kleur+';filter:brightness(.6);clip-path:polygon(0 0,'+(w/2)+'px '+(ht/2)+'px,'+(w/2)+'px '+(ht/2+hv)+'px,0 '+hv+'px);z-index:'+z+'"></div>';
  var rf='<div '+klik+'class="isoface" style="cursor:pointer;position:absolute;left:'+sx+'px;top:'+(sy+ht/2)+'px;width:'+(w/2)+'px;height:'+(ht/2+hv)+'px;background:'+kleur+';filter:brightness(.8);clip-path:polygon(0 '+(ht/2)+'px,'+(w/2)+'px 0,'+(w/2)+'px '+hv+'px,0 '+(ht/2+hv)+'px);z-index:'+z+'"></div>';
  var top='<div '+klik+'class="isoblok'+kl+'" style="cursor:pointer;position:absolute;left:'+(sx-w/2)+'px;top:'+sy+'px;width:'+w+'px;height:'+ht+'px;background:'+kleur+';'+glans+'clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);z-index:'+z+'"></div>';
  return lf+rf+top;
}
/* alleen de statische tegels (het landschap), nu als 3D-kubussen */
function bwTilesHtml(wl){
  var ox=wl.h*BW_TILEW/2, cellen="";
  for(var y=0;y<wl.h;y++){ for(var x=0;x<wl.w;x++){
    var stapel=wl.grid[y][x];
    for(var L=0;L<stapel.length;L++){
      var type=stapel[L], def=blokDef(type);
      var sx=(x-y)*BW_TILEW/2 + ox, sy=(x+y)*BW_TILEH/2 - L*BW_LAYERH + BW_OY, z=(x+y)*10+L;
      cellen+=isoBlokHtml(sx, sy, def, z, x, y, type);
    }
  }}
  return cellen;
}
/* Tik op een cel: bouw / hak / loop ernaartoe (afhankelijk van de modus). */

  else { w.pop.x=x; w.pop.y=y; oogst(x,y); bewaarState(); bwTekenLeven(); }   // avontuur: erheen lopen
}

   +'<div class="rij midden" style="justify-content:center">'

/* ---- Levende laag: persistente figuurtjes die vloeiend bewegen ---- */
function _escNaam(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function bwSpawnLeven(){
  var laag=document.getElementById("bwLeven"); if(!laag) return;
  laag.innerHTML=""; _bw.nodes=[];
  var w=bwWereld();
  (w.wezens||[]).forEach(function(z){
    var el=document.createElement("div"); el.className="bwwezen";
    var _wafb=wezenAfb(z); if(_wafb){ el.innerHTML='<img class="wimg" src="'+_wafb+'" alt="">'; } else { el.textContent=z.s; }
    laag.appendChild(el); _bw.nodes.push(el);
  });
  // Het bestuurbare poppetje: duidelijk gemarkeerd met de eigen naam erboven, zodat het opvalt.
  var pel=document.createElement("div"); pel.className="bwpop";
  pel.innerHTML='<span class="jijtag">'+_escNaam(S.naam||"jij")+'</span><span class="jijfig">'+avatarHtml(spelerAvatar(),28)+'</span>';
  laag.appendChild(pel); _bw.popNode=pel;
  var sp=document.createElement("div"); sp.className="bwspark blij"; sp.textContent="✨";
  laag.appendChild(sp); _bw.sparkleNode=sp;
  bwTekenLeven();
}
function bwTekenLeven(){
  var w=bwWereld();
  if(_bw.nodes && w.wezens){
    for(var i=0;i<_bw.nodes.length && i<w.wezens.length;i++){
      var z=w.wezens[i], el=_bw.nodes[i]; if(!el) continue;
      var pos=bwIso(w, z.x, z.y, 6);
      el.style.left=(pos.x-9)+"px"; el.style.top=(pos.y-15)+"px"; el.style.zIndex=pos.z+2;
    }
  }
  if(_bw.popNode){ var p=w.pop, pp=bwIso(w, p.x, p.y, 10);
    _bw.popNode.style.left=(pp.x-11)+"px"; _bw.popNode.style.top=(pp.y-18)+"px"; _bw.popNode.style.zIndex=pp.z+6; }
  if(_bw.sparkleNode){
    if(w.verstopt){ var s=bwIso(w, w.verstopt.x, w.verstopt.y, 10);
      _bw.sparkleNode.style.display="block"; _bw.sparkleNode.style.left=(s.x-8)+"px"; _bw.sparkleNode.style.top=(s.y-12)+"px"; _bw.sparkleNode.style.zIndex=999; }
    else { _bw.sparkleNode.style.display="none"; }
  }
}
/* één beweegtik: elk wezen zet (soms) een stap naar een buurvakje, binnen de grenzen */
function bwStap(){
  if(!_bw.actief) return;
  var w=bwWereld(); if(!w.wezens) w.wezens=[];
  var dirs=[[1,0],[-1,0],[0,1],[0,-1],[0,0],[0,0]];
  for(var i=0;i<w.wezens.length;i++){
    var z=w.wezens[i];
    if(Math.random()<0.75){
      var d=dirs[Math.floor(Math.random()*dirs.length)];
      z.x=Math.max(0,Math.min(w.w-1, z.x+d[0]));
      z.y=Math.max(0,Math.min(w.h-1, z.y+d[1]));
    }
  }
  if(bwGroei(w)) bwHertekenTiles();   // gewassen groeien; hertekenen als er iets veranderde
  bwTekenLeven();
}
/* Laat gewas op akkers een stapje groeien: akker → 🌱 → rijp gewas. Retourneert of er iets veranderde. */
function bwGroei(w){
  var veranderd=false;
  for(var y=0;y<w.h;y++){ for(var x=0;x<w.w;x++){
    var cel=w.grid[y][x]; if(cel.indexOf("akker")<0) continue;
    var top=cel[cel.length-1];
    if(top==="akker"){ if(Math.random()<GEWAS_KANS){ cel.push("kiem"); veranderd=true; } }
    else if(top==="kiem"){ if(Math.random()<GEWAS_KANS){ cel.pop(); cel.push(GEWAS_RIJP[Math.floor(Math.random()*GEWAS_RIJP.length)]); veranderd=true; } }
  }}
  return veranderd;
}
function bwStartLoop(){
  bwStopLoop();
  if(typeof setInterval==="undefined") return;
  var tempo = _reduceerBeweging() ? 1500 : 800;
  _bwTimer = setInterval(function(){ try{ bwStap(); }catch(e){} }, tempo);
}
function bwStopLoop(){ if(_bwTimer){ try{ clearInterval(_bwTimer); }catch(e){} _bwTimer=null; } }
/* los maatje bijkopen — verschijnt bij het poppetje en gaat rondlopen.
   sel = index in de koopbaar-lijst (winkelknop) óf een emoji-string (directe keuze). */
function bwKoopWezen(sel){
  var w=bwWereld();
  if(S.valuta<WEZEN_PRIJS){ creditsOpMelding(); return false; }
  var s, afb="";
  if(typeof sel==="number"){ var k=wezenKoopbaar()[sel]||{emoji:"🐔",afbeelding:""}; s=k.emoji; afb=k.afbeelding||""; }
  else { s=String(sel); }
  geefValuta(-WEZEN_PRIJS);
  w.wezens.push({ s:s, afb:afb, x:w.pop.x, y:w.pop.y });
  speelGeluid("schat"); toonToast("Nieuw maatje! "+s+" loopt rond ✨");
  bewaarState(); bwSpawnLeven(); return true;
}

  var body = encodeURIComponent("Wat vond je kind leuk?\n\nWat kan beter?\n\nWerkte alles goed op je toestel? (iPhone/Android + model)\n\n");
  try{ location.href = "mailto:"+FEEDBACK_EMAIL+"?subject="+onderwerp+"&body="+body; }catch(e){}

/* =====================  APP INSTALLEREN (iPhone + Android)  ===================== */
var _installPrompt = null;
function isStandalone(){ try{ return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || (typeof navigator!=="undefined" && navigator.standalone===true); }catch(e){ return false; } }
function isIOS(){ try{ return /iphone|ipad|ipod/i.test((typeof navigator!=="undefined"&&navigator.userAgent)||""); }catch(e){ return false; } }
if(typeof window!=="undefined"){
  window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); _installPrompt=e; var b=document.getElementById("knopInstall"); if(b) b.hidden=false; });
  window.addEventListener("appinstalled", function(){ var b=document.getElementById("knopInstall"); if(b) b.hidden=true; sluitInstallTip(); });
}
function installeerApp(){
  if(_installPrompt){ _installPrompt.prompt(); _installPrompt.userChoice.finally(function(){ _installPrompt=null; var b=document.getElementById("knopInstall"); if(b) b.hidden=true; }); }
  else if(isIOS()){ openOverlay('<h2>📲 Zet op je beginscherm</h2><p>Op de iPhone/iPad:</p><ol><li>Tik onderin op het <b>deel-icoon</b> (het vierkantje met pijltje omhoog).</li><li>Kies <b>Zet op beginscherm</b>.</li><li>Tik op <b>Voeg toe</b>.</li></ol><p class="klein">Daarna opent Archito als een echte app, zonder browserbalk.</p>'); }
  else { openOverlay('<h2>📲 App installeren</h2><p>Open het menu van je browser (⋮) en kies <b>App installeren</b> of <b>Toevoegen aan startscherm</b>.</p>'); }
}
function toonInstallTip(){
  var t=document.getElementById("installTip"); if(!t) return;
  if(isStandalone() || S.installTipWeg){ t.hidden=true; return; }
  var tekst = isIOS()
    ? '📲 Tip: zet Archito op je beginscherm — tik op <b>deel</b> ⬆️ en <b>Zet op beginscherm</b>.'
    : '📲 Zet Archito als app op je toestel voor de fijnste ervaring.';
  var knop = isIOS() ? '<button onclick="installeerApp()">Hoe?</button>' : '<button onclick="installeerApp()">Installeer</button>';
  t.innerHTML = '<span>'+tekst+'</span><span class="rij">'+knop+'<button onclick="sluitInstallTip()" title="Sluiten">✕</button></span>';
  t.hidden=false;
}
function sluitInstallTip(){ S.installTipWeg=true; bewaarState(); var t=document.getElementById("installTip"); if(t) t.hidden=true; }

/* ---- Init ---- */
function init(){
  laadState(); laadStemmen();
  if(window.speechSynthesis){ window.speechSynthesis.onvoiceschanged = laadStemmen; }
  pasThemaToe(); startSchermtijdKlok();
  if(!S.naam){ startOnboarding(); }
  else { updateHud(); if(aantalProfielen()>1) kiesProfielScherm(); }   // terugkomen: eerst kiezen met welk kind je verder gaat
  var v=document.getElementById("versie"); if(v) v.textContent="v"+APP_VERSIE;
  toonInstallTip();
  ontgrendelAudioBijGebaar();
  registreerServiceWorker();
}
/* iOS/Chrome: audio mag pas na een gebruikersgebaar, en wordt weer gepauzeerd als je de app
   wegklikt. Daarom bij ELKE tik/toets de audiocontext wakker maken (niet alleen de eerste keer),
   met een stille buffer om iOS echt te ontgrendelen, en opnieuw activeren bij terugkeer in de app. */
var _audioWakker = false;
function wekAudio(){
  try{
    var ac = audioCtx(); if(!ac) return;
    if(ac.state==="suspended" && ac.resume) ac.resume();
    if(!_audioWakker && ac.createBuffer){                  // iOS: één stille buffer ontgrendelt de audio echt
      var b=ac.createBuffer(1,1,22050), s=ac.createBufferSource();
      s.buffer=b; s.connect(ac.destination); s.start(0); _audioWakker=true;
    }
    if(S.muziekAan && !_muziek) startMuziek();
  }catch(e){}
}
function ontgrendelAudioBijGebaar(){
  if(typeof window==="undefined") return;
  ["pointerdown","touchstart","keydown","click"].forEach(function(ev){ window.addEventListener(ev, wekAudio, {passive:true}); });
  try{ document.addEventListener("visibilitychange", function(){ if(!document.hidden) wekAudio(); }); }catch(e){}
  try{ window.addEventListener("focus", wekAudio); }catch(e){}
}
/* Service worker registreren + automatisch bijwerken naar de nieuwste versie. */
function registreerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  try{
    var herladen=false;
    navigator.serviceWorker.addEventListener("controllerchange", function(){
      if(herladen) return; herladen=true; location.reload();
    });
    navigator.serviceWorker.register('sw.js').then(function(reg){
      // check meteen op een nieuwere versie
      try{ reg.update(); }catch(e){}
      reg.addEventListener("updatefound", function(){
        var nw = reg.installing; if(!nw) return;
        nw.addEventListener("statechange", function(){
          // nieuwe versie klaar terwijl er al een actief is → direct activeren
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            try{ nw.postMessage("SKIP_WACHTEN"); }catch(e){}
          }
        });
      });
    }).catch(function(){});
  }catch(e){}
}
if(typeof window!=="undefined" && !window.__BLOKWERELD_TEST__){
  window.addEventListener("load", init);
}

/* Exporteren voor de testsuite (Node) */
if(typeof module!=="undefined"){
  module.exports = { get S(){return S;}, set S(v){S=v;}, THEMAS, nieuweState, leeftijdNaarGroep, groepNaarNiveau };
}
